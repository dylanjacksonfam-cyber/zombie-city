<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Hollow Creek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        #vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 2;
            background: radial-gradient(ellipse at center, transparent 38%, rgba(0, 0, 0, 0.88) 100%);
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.94);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            gap: 14px;
            color: #8a7060;
        }

        #overlay .eyebrow {
            font-size: 0.65rem;
            letter-spacing: 0.45em;
            color: #4a2020;
            text-transform: uppercase;
        }

        #overlay h1 {
            font-size: 3.2rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #aa2222;
            text-shadow: 0 0 40px rgba(160, 20, 20, 0.65), 0 0 80px rgba(160, 20, 20, 0.25);
        }

        #overlay .sub {
            font-size: 0.72rem;
            color: #5a4030;
            letter-spacing: 0.2em;
        }

        .ctrl-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 26px;
            font-size: 0.73rem;
            margin-top: 8px;
            color: #6a5040;
        }

        .ctrl {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .key {
            background: rgba(160, 40, 40, 0.08);
            border: 1px solid #4a2020;
            padding: 2px 8px;
            border-radius: 2px;
            font-size: 0.68rem;
            color: #aa3333;
            min-width: 52px;
            text-align: center;
        }

        #start-btn {
            margin-top: 12px;
            padding: 12px 44px;
            background: rgba(160, 30, 30, 0.07);
            border: 1px solid #aa2222;
            color: #aa2222;
            font-family: 'Courier New', monospace;
            font-size: 0.88rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        #start-btn:hover {
            background: rgba(160, 30, 30, 0.16);
            box-shadow: 0 0 22px rgba(160, 20, 20, 0.5);
        }

        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            display: none;
            z-index: 4;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
        }

        #crosshair::before,
        #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(200, 40, 40, 0.85);
        }

        #crosshair::before {
            width: 1px;
            height: 100%;
            left: 50%;
            transform: translateX(-50%);
        }

        #crosshair::after {
            height: 1px;
            width: 100%;
            top: 50%;
            transform: translateY(-50%);
        }

        #ammo {
            position: absolute;
            bottom: 24px;
            right: 28px;
            color: #cc2222;
            font-size: 1.45rem;
            letter-spacing: 0.1em;
            text-shadow: 0 0 10px rgba(180, 0, 0, 0.5);
        }

        #ammo .lbl {
            font-size: 0.68rem;
            opacity: 0.5;
            margin-right: 8px;
            letter-spacing: 0.2em;
        }

        #flashlight-hud {
            position: absolute;
            bottom: 24px;
            left: 28px;
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #6a8060;
            opacity: 0.75;
        }

        #flashlight-hud.off {
            color: #4a3030;
        }

        #flash-fx {
            position: absolute;
            inset: 0;
            background: rgba(255, 100, 0, 0.0);
            pointer-events: none;
            transition: background 0.04s;
        }

        #flash-fx.active {
            background: rgba(255, 100, 0, 0.14);
        }

        #reload-msg {
            position: absolute;
            top: 57%;
            left: 50%;
            transform: translateX(-50%);
            color: #aa2020;
            font-size: 0.78rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #reload-msg.show {
            opacity: 1;
        }

        #paused {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            color: #aa2222;
            font-size: 1.3rem;
            letter-spacing: 0.35em;
        }
    </style>
</head>

<body>
    <canvas id="canvas"></canvas>
    <div id="vignette"></div>

    <div id="overlay">
        <div class="eyebrow">population: unknown</div>
        <h1>Hollow Creek</h1>
        <div class="sub">somewhere in the deep south</div>
        <div class="ctrl-grid">
            <div class="ctrl"><span class="key">W A S D</span> Move</div>
            <div class="ctrl"><span class="key">Mouse</span> Look</div>
            <div class="ctrl"><span class="key">Click</span> Shoot</div>
            <div class="ctrl"><span class="key">R</span> Reload</div>
            <div class="ctrl"><span class="key">Shift</span> Sprint</div>
            <div class="ctrl"><span class="key">F</span> Flashlight</div>
            <div class="ctrl"><span class="key">Esc</span> Pause</div>
        </div>
        <button id="start-btn" onclick="startGame()">ENTER THE TOWN</button>
    </div>

    <div id="hud">
        <div id="crosshair"></div>
        <div id="flash-fx"></div>
        <div id="reload-msg">— RELOADING —</div>
        <div id="ammo"><span class="lbl">MAG</span><span id="ammo-count">7 / 49</span></div>
        <div id="flashlight-hud">[ F ] Flashlight ON</div>
        <div id="paused">— PAUSED —</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        'use strict';

        // ─── Renderer ─────────────────────────────────────────────────────────────────
        const canvas = document.getElementById('canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.28;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x02040a);
        scene.fog = new THREE.FogExp2(0x02040a, 0.028);

        // ─── Cameras ──────────────────────────────────────────────────────────────────
        const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.05, 160);
        camera.position.set(0, 1.75, 5);

        const gunCamera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.01, 10);

        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            renderer.setSize(w, h);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            gunCamera.aspect = w / h;
            gunCamera.updateProjectionMatrix();
        });

        // ─── Lighting ─────────────────────────────────────────────────────────────────
        // Near-black ambient
        scene.add(new THREE.AmbientLight(0x06080e, 0.5));

        // Moon — cold, faint
        const moon = new THREE.DirectionalLight(0x8090b8, 0.18);
        moon.position.set(-40, 90, -30);
        moon.castShadow = true;
        moon.shadow.mapSize.set(1024, 1024);
        moon.shadow.camera.near = 1;
        moon.shadow.camera.far = 200;
        moon.shadow.camera.left = moon.shadow.camera.bottom = -80;
        moon.shadow.camera.right = moon.shadow.camera.top = 80;
        moon.shadow.bias = -0.0003;
        scene.add(moon);

        // ─── Flashlight (SpotLight parented to camera) ────────────────────────────────
        const flashlight = new THREE.SpotLight(0xfff5e0, 4.0, 40, Math.PI / 9, 0.35, 1.2);
        flashlight.castShadow = false; // keep perf good
        const flashTarget = new THREE.Object3D();
        scene.add(flashTarget);
        flashlight.target = flashTarget;
        scene.add(flashlight);
        let flashlightOn = true;

        function updateFlashlight() {
            // Position slightly below camera center to simulate hand-held
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            const offset = new THREE.Vector3(0.18, -0.12, 0).applyQuaternion(camera.quaternion);
            flashlight.position.copy(camera.position).add(offset);
            flashTarget.position.copy(camera.position).add(offset).addScaledVector(dir, 20);
            flashlight.intensity = flashlightOn ? 4.0 : 0;
        }

        // ─── Helpers ──────────────────────────────────────────────────────────────────
        const rng = (a, b) => a + Math.random() * (b - a);

        // ─── Colliders (AABB list) ────────────────────────────────────────────────────
        const colliders = [];
        function addBox(cx, cz, hw, hd) {
            colliders.push({ minX: cx - hw, maxX: cx + hw, minZ: cz - hd, maxZ: cz + hd });
        }

        // ─── Materials ────────────────────────────────────────────────────────────────
        const M = {
            // Wood siding colors — weathered, faded paint
            siding1: new THREE.MeshLambertMaterial({ color: 0x8a7060 }),
            siding2: new THREE.MeshLambertMaterial({ color: 0x7a6858 }),
            siding3: new THREE.MeshLambertMaterial({ color: 0x9a8878 }),
            siding4: new THREE.MeshLambertMaterial({ color: 0x6a5c50 }),
            sidingW: new THREE.MeshLambertMaterial({ color: 0xc8bca8 }), // white/cream
            // Roofs
            roofTin: new THREE.MeshLambertMaterial({ color: 0x4a5858 }), // tin roof
            roofDark: new THREE.MeshLambertMaterial({ color: 0x282420 }),
            roofShng: new THREE.MeshLambertMaterial({ color: 0x3a3028 }), // dark shingles
            // Structure
            brick: new THREE.MeshLambertMaterial({ color: 0x6a3a28 }),
            brick2: new THREE.MeshLambertMaterial({ color: 0x7a4030 }),
            concrete: new THREE.MeshLambertMaterial({ color: 0x484440 }),
            wood: new THREE.MeshLambertMaterial({ color: 0x5a4228 }),
            darkWood: new THREE.MeshLambertMaterial({ color: 0x2e2018 }),
            porch: new THREE.MeshLambertMaterial({ color: 0x7a6848 }),
            // Windows — mostly dark, few amber-lit
            winDark: new THREE.MeshLambertMaterial({ color: 0x080c10, transparent: true, opacity: 0.9 }),
            winAmber: new THREE.MeshLambertMaterial({ color: 0x604010, transparent: true, opacity: 0.88 }),
            winRed: new THREE.MeshLambertMaterial({ color: 0x5a0808, transparent: true, opacity: 0.88 }),
            // Ground
            dirt: new THREE.MeshLambertMaterial({ color: 0x2a2018 }),
            gravel: new THREE.MeshLambertMaterial({ color: 0x303028 }),
            grass: new THREE.MeshLambertMaterial({ color: 0x141a08 }),
            // Metal
            rust: new THREE.MeshLambertMaterial({ color: 0x3a1e10 }),
            metal: new THREE.MeshLambertMaterial({ color: 0x282828 }),
        };

        function randWin() {
            const r = Math.random();
            if (r < 0.06) return M.winRed;
            if (r < 0.18) return M.winAmber;
            return M.winDark;
        }

        // ─── Ground ───────────────────────────────────────────────────────────────────
        (function buildGround() {
            // Terrain mesh with gentle undulation
            const geo = new THREE.PlaneGeometry(400, 400, 80, 80);
            const pos = geo.attributes.position;
            for (let i = 0; i < pos.count; i++) {
                const x = pos.getX(i), z = pos.getZ(i);
                const d = Math.sqrt(x * x + z * z);
                const t = Math.max(0, Math.min(1, (d - 36) / 20));
                pos.setY(i, t * (
                    Math.sin(x * 0.14) * Math.cos(z * 0.16) * 0.7 +
                    Math.sin(x * 0.4 + 1) * Math.cos(z * 0.35 + 2) * 0.4 +
                    Math.sin(x * 0.08) * Math.sin(z * 0.09) * 1.1
                ));
            }
            geo.computeVertexNormals();
            scene.add(Object.assign(new THREE.Mesh(geo, M.grass), {
                rotation: { x: -Math.PI / 2 }, receiveShadow: true
            }));

            // Town dirt square
            const sq = new THREE.Mesh(new THREE.PlaneGeometry(72, 72), M.dirt);
            sq.rotation.x = -Math.PI / 2; sq.position.y = 0.006; scene.add(sq);

            // Main road — cracked asphalt
            const roadMat = new THREE.MeshLambertMaterial({ color: 0x141210 });
            for (const [w, l, ox, oz] of [
                [7, 100, 0, 0], [100, 7, 0, 0],
                [5, 55, -20, 0], [5, 55, 20, 0],
                [55, 5, 0, -22], [55, 5, 0, 22],
            ]) {
                const r = new THREE.Mesh(new THREE.PlaneGeometry(w, l), roadMat);
                r.rotation.x = -Math.PI / 2; r.position.set(ox, 0.008, oz); scene.add(r);
            }

            // Center line dashes
            const dashMat = new THREE.MeshLambertMaterial({ color: 0x3a3428 });
            for (let z = -48; z < 48; z += 6) {
                const d = new THREE.Mesh(new THREE.PlaneGeometry(0.15, 2.8), dashMat);
                d.rotation.x = -Math.PI / 2; d.position.set(0, 0.01, z); scene.add(d);
            }
            for (let x = -48; x < 48; x += 6) {
                const d = new THREE.Mesh(new THREE.PlaneGeometry(2.8, 0.15), dashMat);
                d.rotation.x = -Math.PI / 2; d.position.set(x, 0.01, 0); scene.add(d);
            }

            // Gravel patches near buildings
            for (let i = 0; i < 20; i++) {
                const gp = new THREE.Mesh(new THREE.PlaneGeometry(rng(4, 10), rng(3, 8)), M.gravel);
                gp.rotation.x = -Math.PI / 2;
                gp.position.set(rng(-30, 30), 0.007, rng(-30, 30)); scene.add(gp);
            }
        })();

        // ─── Building helpers ──────────────────────────────────────────────────────────
        function addWin(g, x, y, z, w, h, mat, ry = 0) {
            const win = new THREE.Mesh(new THREE.BoxGeometry(w, h, 0.07), mat);
            win.position.set(x, y, z); win.rotation.y = ry; g.add(win);
            // window frame
            const frame = new THREE.Mesh(new THREE.BoxGeometry(w + 0.12, h + 0.12, 0.05), M.darkWood);
            frame.position.set(x, y, z - 0.01); frame.rotation.y = ry; g.add(frame);
        }

        function addPorch(g, w, posY, posZ, d = 1.6) {
            // Porch deck
            const deck = new THREE.Mesh(new THREE.BoxGeometry(w, 0.15, d), M.porch);
            deck.position.set(0, posY, posZ); g.add(deck);
            // Porch roof overhang
            const roof = new THREE.Mesh(new THREE.BoxGeometry(w + 0.2, 0.12, d + 0.1), M.roofTin);
            roof.position.set(0, posY + 2.2, posZ); g.add(roof);
            // Posts
            const nPosts = Math.max(2, Math.round(w / 2));
            for (let i = 0; i < nPosts; i++) {
                const px = -w / 2 + 0.3 + i * ((w - 0.6) / (nPosts - 1 || 1));
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 2.1, 0.12), M.sidingW);
                post.position.set(px, posY + 1.05, posZ + d / 2 - 0.06); g.add(post);
            }
            // Railing
            const rail = new THREE.Mesh(new THREE.BoxGeometry(w, 0.08, 0.06), M.sidingW);
            rail.position.set(0, posY + 0.85, posZ + d / 2 - 0.06); g.add(rail);
        }

        // ─── Southern House ────────────────────────────────────────────────────────────
        function makeHouse(x, z, w, d, h, wallMat = M.siding1, hasPorch = true) {
            const g = new THREE.Group(); g.position.set(x, 0, z);

            // Foundation / cinder block base
            const found = new THREE.Mesh(new THREE.BoxGeometry(w + 0.3, 0.5, d + 0.3), M.concrete);
            found.position.y = 0.25; g.add(found);

            // Walls
            const walls = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), wallMat);
            walls.position.y = h / 2 + 0.5; walls.castShadow = true; walls.receiveShadow = true; g.add(walls);

            // Gable ends (triangular)
            for (const sz of [-1, 1]) {
                const gable = new THREE.Mesh(new THREE.CylinderGeometry(0, w / 2 * 1.05, h * 0.5, 4, 1), wallMat);
                gable.position.set(0, h + 0.5 + h * 0.25, sz * d / 2);
                gable.rotation.y = Math.PI / 4; g.add(gable);
            }

            // Tin pitched roof
            const roofW = w * 1.08, roofD = d + 0.6, ridgeH = h * 0.48;
            for (const [sx, rx] of [[-1, 0.5], [1, -0.5]]) {
                const slope = new THREE.Mesh(new THREE.BoxGeometry(roofW / 2 + 0.1, 0.12, roofD), M.roofTin);
                slope.rotation.z = sx * rx;
                slope.position.set(sx * roofW / 4, h + 0.5 + ridgeH * 0.5 - 0.08, 0);
                slope.castShadow = true; g.add(slope);
            }

            // Chimney
            const chimH = ridgeH + 1.2;
            const chim = new THREE.Mesh(new THREE.BoxGeometry(0.55, chimH, 0.55), M.brick);
            chim.position.set(w * 0.28, h + 0.5 + chimH / 2 - 0.1, 0); g.add(chim);

            // Windows
            const winy = h * 0.55 + 0.5;
            addWin(g, -w * 0.26, winy, d / 2 + 0.04, 0.9, 1.1, randWin());
            addWin(g, w * 0.26, winy, d / 2 + 0.04, 0.9, 1.1, randWin());
            addWin(g, -w * 0.26, winy, -d / 2 - 0.04, 0.9, 1.1, randWin());
            addWin(g, w * 0.26, winy, -d / 2 - 0.04, 0.9, 1.1, randWin());
            addWin(g, w / 2 + 0.04, winy, 0, 0.9, 1.1, randWin(), Math.PI / 2);
            addWin(g, -w / 2 - 0.04, winy, 0, 0.9, 1.1, randWin(), Math.PI / 2);

            // Door
            const door = new THREE.Mesh(new THREE.BoxGeometry(0.95, 2.1, 0.09), M.darkWood);
            door.position.set(0, 1.55, d / 2 + 0.05); g.add(door);
            const doorFr = new THREE.Mesh(new THREE.BoxGeometry(1.12, 2.25, 0.07), M.wood);
            doorFr.position.set(0, 1.62, d / 2 + 0.06); g.add(doorFr);

            // Porch
            if (hasPorch) addPorch(g, Math.min(w, 5), 0.58, d / 2 + 0.9);

            // Screen door
            const sdr = new THREE.Mesh(new THREE.BoxGeometry(0.9, 2.0, 0.04), M.winDark);
            sdr.position.set(0, 1.5, d / 2 + 0.85); g.add(sdr);

            // Mailbox post + box
            const mbPost = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.9, 0.08), M.metal);
            mbPost.position.set(w / 2 + 1.5, 0.95, d / 2 + 0.3); g.add(mbPost);
            const mb = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.22, 0.28), M.rust);
            mb.position.set(w / 2 + 1.5, 1.55, d / 2 + 0.3); g.add(mb);

            scene.add(g);
            addBox(x, z, w / 2 + 0.25, d / 2 + 0.25);
            return g;
        }

        // ─── Church ────────────────────────────────────────────────────────────────────
        function makeChurch(x, z) {
            const g = new THREE.Group(); g.position.set(x, 0, z);

            // Foundation
            const found = new THREE.Mesh(new THREE.BoxGeometry(10.4, 0.6, 14.4), M.concrete);
            found.position.y = 0.3; g.add(found);

            // Main nave — white board-and-batten
            const nave = new THREE.Mesh(new THREE.BoxGeometry(10, 7, 14), M.sidingW);
            nave.position.y = 4; nave.castShadow = true; nave.receiveShadow = true; g.add(nave);

            // Gable roof
            for (const [sz, rz] of [[-1, 0.55], [1, -0.55]]) {
                const slope = new THREE.Mesh(new THREE.BoxGeometry(10.6, 0.14, 15), M.roofTin);
                slope.rotation.z = sz * rz; slope.position.set(0, 9.8, 0); slope.castShadow = true; g.add(slope);
            }
            // Gable faces
            for (const sz of [-1, 1]) {
                const gab = new THREE.Mesh(new THREE.CylinderGeometry(0, 5.5, 5.8, 4, 1), M.sidingW);
                gab.position.set(0, 9.9, sz * 7); gab.rotation.y = Math.PI / 4; g.add(gab);
            }

            // Bell tower / steeple
            const tower = new THREE.Mesh(new THREE.BoxGeometry(4, 10, 4), M.sidingW);
            tower.position.set(0, 5.6, 9); tower.castShadow = true; g.add(tower);
            const steepleBase = new THREE.Mesh(new THREE.BoxGeometry(4.3, 0.5, 4.3), M.sidingW);
            steepleBase.position.set(0, 11.1, 9); g.add(steepleBase);
            const steeple = new THREE.Mesh(new THREE.ConeGeometry(2.2, 9, 4), M.roofTin);
            steeple.position.set(0, 16.5, 9); steeple.rotation.y = Math.PI / 4; steeple.castShadow = true; g.add(steeple);
            // Cross
            const crossV = new THREE.Mesh(new THREE.BoxGeometry(0.18, 2.2, 0.18), M.sidingW);
            crossV.position.set(0, 21.8, 9); g.add(crossV);
            const crossH = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.18, 0.18), M.sidingW);
            crossH.position.set(0, 22.4, 9); g.add(crossH);

            // Louvered bell tower openings
            for (const [ox, oz, ry] of [[2.05, 9, 0], [-2.05, 9, 0], [0, 9 + 2.05, Math.PI / 2], [0, 9 - 2.05, Math.PI / 2]]) {
                const louv = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.8, 0.08), M.winDark);
                louv.position.set(ox, 10, oz); louv.rotation.y = ry; g.add(louv);
            }

            // Arched windows along nave
            for (const wz of [-4, 0, 4]) {
                addWin(g, 5.05, 4.5, wz, 1.1, 2.2, randWin(), Math.PI / 2);
                addWin(g, -5.05, 4.5, wz, 1.1, 2.2, randWin(), Math.PI / 2);
            }
            addWin(g, 0, 5, -7.05, 1.8, 2.8, M.winAmber);

            // Wide front porch/portico
            addPorch(g, 9, 0.6, 7.6, 2.2);

            // Double front doors
            for (const ox of [-0.5, 0.5]) {
                const dr = new THREE.Mesh(new THREE.BoxGeometry(0.8, 2.4, 0.09), M.darkWood);
                dr.position.set(ox, 1.8, 7.07); g.add(dr);
            }

            // Steps
            for (let i = 0; i < 3; i++) {
                const step = new THREE.Mesh(new THREE.BoxGeometry(5.5 - i * 0.4, 0.2, 0.6), M.concrete);
                step.position.set(0, i * 0.2 + 0.1, 8.9 + i * 0.3); g.add(step);
            }

            scene.add(g);
            addBox(x, z, 5.2, 7.2);
            addBox(x, z + 9, 2.2, 2.2);
        }

        // ─── Diner ────────────────────────────────────────────────────────────────────

        // ─── Wooden fence ──────────────────────────────────────────────────────────────
        function makeWoodFence(x1, z1, x2, z2) {
            const dx = x2 - x1, dz = z2 - z1, len = Math.sqrt(dx * dx + dz * dz);
            const ang = Math.atan2(dx, dz), n = Math.max(2, Math.floor(len / 1.6));
            for (let i = 0; i <= n; i++) {
                const t = i / n;
                const post = new THREE.Mesh(new THREE.BoxGeometry(0.12, 1.6, 0.12), M.darkWood);
                post.position.set(x1 + dx * t, 0.8, z1 + dz * t); scene.add(post);
            }
            const mx = (x1 + x2) / 2, mz = (z1 + z2) / 2;
            for (const ry of [1.05, 0.52]) {
                const rail = new THREE.Mesh(new THREE.BoxGeometry(0.09, 0.09, len), M.darkWood);
                rail.position.set(mx, ry, mz); rail.rotation.y = ang; scene.add(rail);
            }
        }

        // ─── Dead Southern Tree (twisted, Spanish moss suggestion) ────────────────────
        function makeTree(x, z, sc = 1) {
            const g = new THREE.Group(); g.position.set(x, 0, z); g.rotation.y = Math.random() * Math.PI * 2;
            const tMat = new THREE.MeshLambertMaterial({ color: 0x0e0c08 });

            const trH = (3.5 + Math.random() * 3.5) * sc;
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16 * sc, 0.28 * sc, trH, 7), tMat);
            trunk.position.y = trH / 2; trunk.rotation.z = rng(-0.08, 0.08); trunk.castShadow = true; g.add(trunk);

            const numBr = 3 + Math.floor(Math.random() * 4);
            for (let i = 0; i < numBr; i++) {
                const a = (i / numBr) * Math.PI * 2 + rng(-0.3, 0.3);
                const bLen = (1.5 + Math.random() * 2.5) * sc;
                const bY = trH * (0.45 + Math.random() * 0.45);

                const br = new THREE.Mesh(new THREE.CylinderGeometry(0.05 * sc, 0.1 * sc, bLen, 5), tMat);
                br.position.set(Math.cos(a) * bLen * 0.4, bY, Math.sin(a) * bLen * 0.4);
                br.rotation.z = (Math.PI * 0.42 - rng(0, 0.35)) * Math.sign(Math.cos(a));
                br.rotation.y = a; br.castShadow = true; g.add(br);

                // Hanging moss wisps
                const numMoss = Math.floor(Math.random() * 3);
                for (let m = 0; m < numMoss; m++) {
                    const mossH = rng(0.8, 2.5) * sc;
                    const moss = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.04 * sc, 0.01, mossH, 4),
                        new THREE.MeshLambertMaterial({ color: 0x1a1e0a, transparent: true, opacity: 0.7 })
                    );
                    const mox = Math.cos(a) * bLen * 0.6 + rng(-0.4, 0.4);
                    const moz = Math.sin(a) * bLen * 0.6 + rng(-0.4, 0.4);
                    moss.position.set(mox, bY - mossH * 0.5 - rng(0, 0.5), moz);
                    g.add(moss);
                }

                // Twigs
                for (let t = 0; t < 2; t++) {
                    const ta = a + rng(-0.7, 0.7);
                    const tLen = bLen * 0.38 * sc;
                    const twig = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.05 * sc, tLen, 4), tMat);
                    twig.position.set(
                        Math.cos(a) * bLen * 0.62 + Math.cos(ta) * tLen * 0.3,
                        bY + rng(0.2, 0.7),
                        Math.sin(a) * bLen * 0.62 + Math.sin(ta) * tLen * 0.3
                    );
                    twig.rotation.z = (Math.PI * 0.45 - rng(0.1, 0.5)) * Math.sign(Math.cos(ta));
                    twig.rotation.y = ta; g.add(twig);
                }
            }
            scene.add(g);
            addBox(x, z, 0.4 * sc, 0.4 * sc);
        }

        // ─── Bullet Impacts ────────────────────────────────────────────────────────────
        const impacts = [];
        function spawnImpact(pos, normal) {
            if (!normal) return;
            const impMesh = new THREE.Mesh(
                new THREE.SphereGeometry(0.04, 4, 4),
                new THREE.MeshBasicMaterial({ color: 0x100a04 })
            );
            impMesh.position.copy(pos).addScaledVector(normal, 0.03);
            scene.add(impMesh);
            impacts.push({ mesh: impMesh, life: 20, spark: false });

            // Keep impact count bounded
            const nonSparks = impacts.filter(i => !i.spark);
            if (nonSparks.length > 40) {
                const old = nonSparks[0];
                scene.remove(old.mesh);
                impacts.splice(impacts.indexOf(old), 1);
            }

            // Sparks
            for (let i = 0; i < 8; i++) {
                const sp = new THREE.Mesh(
                    new THREE.SphereGeometry(0.02, 3, 3),
                    new THREE.MeshBasicMaterial({ color: i < 3 ? 0xff5500 : 0xffaa00 })
                );
                sp.position.copy(pos);
                const dir = new THREE.Vector3(rng(-1, 1), rng(0.3, 2.5), rng(-1, 1)).normalize();
                dir.multiplyScalar(rng(0.04, 0.22));
                scene.add(sp);
                impacts.push({ mesh: sp, vel: dir, life: rng(0.1, 0.3), spark: true });
            }
        }

            const parts = [
                // [geo, mat, pos, rotZ?]
                [new THREE.BoxGeometry(0.036, 0.038, 0.30), dkM, [0, 0, -0.06], 0],
                [new THREE.BoxGeometry(0.065, 0.065, 0.24), slvM, [0, 0.022, -0.04], 0],
                [new THREE.BoxGeometry(0.058, 0.132, 0.08), grpM, [0, -0.088, 0.04], -0.12],
                [new THREE.BoxGeometry(0.026, 0.018, 0.04), slvM, [0.026, 0.019, -0.01], 0],
            ];
            for (const [geo, mat, [px, py, pz], rx] of parts) {
                const m = new THREE.Mesh(geo, mat);
                m.position.set(px, py, pz); m.rotation.x = rx; g.add(m);
            }

            // Muzzle
            const muz = new THREE.Mesh(new THREE.CylinderGeometry(0.017, 0.017, 0.05, 8), dkM);
            muz.rotation.x = Math.PI / 2; muz.position.set(0, 0, -0.22); g.add(muz);

            // Trigger guard
            const grd = new THREE.Mesh(new THREE.TorusGeometry(0.027, 0.007, 6, 10, Math.PI), dkM);
            grd.position.set(0, -0.024, 0.022); grd.rotation.x = Math.PI / 2; g.add(grd);

            // Sights
            const sF = new THREE.Mesh(new THREE.BoxGeometry(0.007, 0.016, 0.014), dkM);
            sF.position.set(0, 0.056, -0.16); g.add(sF);

            // Muzzle flash (hidden)
            const fl = new THREE.Mesh(new THREE.SphereGeometry(0.032, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0xff8800 }));
            fl.position.set(0, 0, -0.25); fl.visible = false; fl.name = 'mflash'; g.add(fl);

            g.name = 'pistol';
            return g;
        }

        const pistol = buildPistol();
        pistol.position.set(0.19, -0.17, -0.36);
        gunGroup.add(pistol);

        // ─── Game State ────────────────────────────────────────────────────────────────
        const keys = {};
        let yaw = 0, pitch = 0;
        let locked = false, gameStarted = false, paused = false;
        let ammo = 7, maxAmmo = 49;
        let reloading = false, reloadTimer = 0;
        let shootCooldown = 0, gunRecoil = 0;

        const WALK_SPEED = 5.2, RUN_SPEED = 9.8, PLAYER_R = 0.4;
        const raycaster = new THREE.Raycaster();

        // ─── Input ─────────────────────────────────────────────────────────────────────
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (!gameStarted || !locked) return;
            if (e.code === 'KeyR' && !reloading && ammo < 7 && maxAmmo > 0) startReload();
            if (e.code === 'KeyF') toggleFlashlight();
        });
        document.addEventListener('keyup', e => { keys[e.code] = false; });

        canvas.addEventListener('click', () => {
            if (!gameStarted) return;
            if (!locked) { canvas.requestPointerLock(); return; }
            if (!paused) shoot();
        });

        document.addEventListener('pointerlockchange', () => {
            locked = document.pointerLockElement === canvas;
            if (locked) {
                document.getElementById('paused').style.display = 'none';
                paused = false;
            } else if (gameStarted) {
                paused = true;
                document.getElementById('paused').style.display = 'flex';
            }
        });

        document.addEventListener('mousemove', e => {
            if (!locked || paused) return;
            yaw -= e.movementX * 0.0022;
            pitch -= e.movementY * 0.0022;
            pitch = Math.max(-Math.PI / 2.1, Math.min(Math.PI / 2.1, pitch));
        });

        // ─── Flashlight toggle ─────────────────────────────────────────────────────────
        function toggleFlashlight() {
            flashlightOn = !flashlightOn;
            const el = document.getElementById('flashlight-hud');
            el.textContent = `[ F ] Flashlight ${flashlightOn ? 'ON' : 'OFF'}`;
            el.className = flashlightOn ? '' : 'off';
        }

        // ─── Shoot ─────────────────────────────────────────────────────────────────────
        const flashFxEl = document.getElementById('flash-fx');
        const reloadMsgEl = document.getElementById('reload-msg');

        function shoot() {
            if (reloading || shootCooldown > 0) return;
            if (ammo <= 0) { startReload(); return; }

            ammo--;
            updateHUD();
            shootCooldown = 0.13;
            gunRecoil = 0.065;

            const mf = pistol.getObjectByName('mflash');
            if (mf) mf.visible = true;
            flashFxEl.classList.add('active');
            setTimeout(() => {
                if (mf) mf.visible = false;
                flashFxEl.classList.remove('active');
            }, 65);

            raycaster.setFromCamera({ x: 0, y: 0 }, camera);
            const meshList = [];
            scene.traverse(o => { if (o.isMesh) meshList.push(o); });
            const hits = raycaster.intersectObjects(meshList, false);
            if (hits.length > 0) {
                spawnImpact(hits[0].point, hits[0].face ? hits[0].face.normal : new THREE.Vector3(0, 1, 0));
            }
        }

        function startReload() {
            if (reloading || maxAmmo <= 0) return;
            reloading = true;
            reloadMsgEl.classList.add('show');
            reloadTimer = 1.8;
        }

        function finishReload() {
            const take = Math.min(7 - ammo, maxAmmo);
            ammo += take; maxAmmo -= take;
            reloading = false;
            reloadMsgEl.classList.remove('show');
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('ammo-count').textContent = `${ammo} / ${maxAmmo}`;
        }

        // ─── Collision (per-axis sweep) ────────────────────────────────────────────────
        function resolveX(pos) {
            for (const b of colliders) {
                const cx = (b.minX + b.maxX) * 0.5, cz = (b.minZ + b.maxZ) * 0.5;
                const hw = (b.maxX - b.minX) * 0.5 + PLAYER_R;
                const hd = (b.maxZ - b.minZ) * 0.5 + PLAYER_R;
                const dx = pos.x - cx, dz = pos.z - cz;
                if (Math.abs(dx) < hw && Math.abs(dz) < hd) {
                    pos.x += (hw - Math.abs(dx)) * Math.sign(dx);
                }
            }
        }

        function resolveZ(pos) {
            for (const b of colliders) {
                const cx = (b.minX + b.maxX) * 0.5, cz = (b.minZ + b.maxZ) * 0.5;
                const hw = (b.maxX - b.minX) * 0.5 + PLAYER_R;
                const hd = (b.maxZ - b.minZ) * 0.5 + PLAYER_R;
                const dx = pos.x - cx, dz = pos.z - cz;
                if (Math.abs(dx) < hw && Math.abs(dz) < hd) {
                    pos.z += (hd - Math.abs(dz)) * Math.sign(dz);
                }
            }
        }

        function doMove(pos, mv) {
            pos.x += mv.x; resolveX(pos);
            pos.z += mv.z; resolveZ(pos);
            // World boundary
            const d = Math.sqrt(pos.x * pos.x + pos.z * pos.z);
            const MAX = FOREST_OUTER - 8;
            if (d > MAX) { pos.x *= MAX / d; pos.z *= MAX / d; }
        }

        // ─── Flickering street lights ──────────────────────────────────────────────────
        let flickTimer = 0;
        function tickFlicker(dt) {
            flickTimer += dt;
            if (flickTimer < 0.07) return;
            flickTimer = 0;
            for (const sl of streetLights) {
                const seed = Math.abs(Math.sin((sl.light.position.x * 17 + sl.light.position.z * 31) * 0.1));
                const rate = seed < 0.25 ? 0.15 : 0.015;
                if (Math.random() < rate) {
                    sl.light.intensity = Math.random() < 0.5 ? 0 : sl.base * (0.4 + Math.random() * 0.6);
                } else {
                    // Drift back towards base
                    sl.light.intensity += (sl.base - sl.light.intensity) * 0.1;
                }
            }
        }

        // ─── Main Loop ─────────────────────────────────────────────────────────────────
        const clock = new THREE.Clock();
        let frame = 0;

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);
            frame++;

            // Animate ash
            const ap = ashGeo.attributes.position;
            for (let i = 0; i < ASH_COUNT; i++) {
                const v = ashVel[i];
                ap.array[i * 3] += v.vx + Math.sin(frame * 0.006 + i) * 0.003;
                ap.array[i * 3 + 1] += v.vy;
                ap.array[i * 3 + 2] += v.vz;
                if (ap.array[i * 3 + 1] < 0.3) {
                    ap.array[i * 3] = rng(-50, 50);
                    ap.array[i * 3 + 1] = rng(5, 12);
                    ap.array[i * 3 + 2] = rng(-50, 50);
                }
            }
            ap.needsUpdate = true;

            if (!gameStarted || paused) {
                renderer.autoClear = true;
                renderer.render(scene, camera);
                return;
            }

            tickFlicker(dt);

            if (shootCooldown > 0) shootCooldown -= dt;
            if (reloading) { reloadTimer -= dt; if (reloadTimer <= 0) finishReload(); }

            // Movement
            const fwd = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
            const rgt = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
            const mv = new THREE.Vector3();
            if (keys['KeyW']) mv.add(fwd);
            if (keys['KeyS']) mv.sub(fwd);
            if (keys['KeyA']) mv.sub(rgt);
            if (keys['KeyD']) mv.add(rgt);

            const spd = (keys['ShiftLeft'] || keys['ShiftRight']) ? RUN_SPEED : WALK_SPEED;
            if (mv.length() > 0) mv.normalize().multiplyScalar(spd * dt);

            doMove(camera.position, mv);
            camera.position.y = 1.75;
            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            // Update flashlight every frame
            updateFlashlight();

            // Gun sway & recoil
            const t = frame * 0.042;
            const moving = mv.length() > 0.001;
            const swAmp = moving ? 0.007 : 0.0015;

            if (gunRecoil > 0) {
                pistol.position.z = -0.36 + gunRecoil;
                pistol.rotation.x = -gunRecoil * 7;
                gunRecoil = Math.max(0, gunRecoil - dt * 0.5);
            } else {
                pistol.position.set(
                    0.19 + Math.sin(t) * swAmp * 0.5,
                    -0.17 + Math.abs(Math.sin(t)) * swAmp,
                    -0.36
                );
                pistol.rotation.x = 0;
            }

            // Advance spark impacts
            for (let i = impacts.length - 1; i >= 0; i--) {
                const im = impacts[i];
                if (im.spark) {
                    im.mesh.position.add(im.vel);
                    im.vel.y -= 0.012;
                    im.life -= dt;
                    if (im.life <= 0) {
                        scene.remove(im.mesh);
                        im.mesh.geometry.dispose();
                        impacts.splice(i, 1);
                    }
                }
            }

            // Render main scene
            renderer.autoClear = true;
            renderer.render(scene, camera);

            // Render gun on top (clear depth only)
            renderer.autoClear = false;
            renderer.clearDepth();
            renderer.render(gunScene, gunCamera);
        }

        // ─── Start ─────────────────────────────────────────────────────────────────────
        function startGame() {
            gameStarted = true;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            updateHUD();
            clock.start();
            canvas.requestPointerLock();
        }

        animate();
    </script>
</body>

</html>
