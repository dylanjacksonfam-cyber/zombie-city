<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thursday the twelfth</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            cursor: crosshair;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            z-index: 10;
            text-align: center;
        }

        #timer-gui {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            text-shadow: 0 0 15px #0f0;
            z-index: 5;
            display: none;
            letter-spacing: 4px;
        }

        #ui-container {
            text-align: center;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            border: 1px solid rgba(0, 255, 0, 0.5);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }

        h1 {
            color: #0f0;
            letter-spacing: 12px;
            text-shadow: 0 0 10px #0f0;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <div id="timer-gui">02:00</div>
    <div id="crosshair"></div>
    <div id="overlay">
        <div id="ui-container">
            <h1 id="status-text">Thursday the twelfth</h1>
            <p id="sub-text">CLICK TO BEGIN SQUAD OPERATION</p>
            <p style="font-size: 0.7em; color: #444; margin-top: 20px;">WASD: MOVE | F: LIGHT | CLICK: FIRE | ESC: PAUSE
            </p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { PointerLockControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/PointerLockControls.js';

        // --- GAME STATE ---
        let timeLeft = 120;
        let gameActive = false;
        let gameOver = false;
        const timerElement = document.getElementById('timer-gui');
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        const subText = document.getElementById('sub-text');

        // --- 1. AUDIO ENGINE ---
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playGunshot() {
            const dur = 0.12;
            const osc = audioCtx.createOscillator();
            const noise = audioCtx.createBufferSource();
            const g = audioCtx.createGain();
            const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
            noise.buffer = buffer;
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + dur);
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            noise.connect(g); osc.connect(g); g.connect(audioCtx.destination);
            noise.start(); osc.start(); noise.stop(audioCtx.currentTime + dur); osc.stop(audioCtx.currentTime + dur);
        }

        // --- 2. ADVANCED SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010203);
        scene.fog = new THREE.FogExp2(0x000000, 0.04);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);
        function createGroundTex() {
            const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#0a0b08'; ctx.fillRect(0, 0, 512, 512);
            for (let i = 0; i < 10000; i++) {
                ctx.fillStyle = `rgba(20,25,15,${Math.random() * 0.3})`;
                ctx.fillRect(Math.random() * 512, Math.random() * 512, 1, 1);
            }
            return new THREE.CanvasTexture(canvas);
        }
        const groundTex = createGroundTex();
        groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
        groundTex.repeat.set(25, 25);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ map: groundTex, roughness: 0.9 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
        scene.add(floor);

        // --- 3. HIGH-DETAIL WEAPON & PRO LIGHTING ---
            const weaponGroup = new THREE.Group();
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.2 });

            const slide = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.14, 0.6), metalMat);
            slide.position.y = 0.05;
            weaponGroup.add(slide);

            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.035, 0.2), metalMat);
            barrel.rotation.x = Math.PI / 2; barrel.position.set(0, 0.05, -0.3);
            weaponGroup.add(barrel);

            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.38, 0.18), new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 }));
            handle.position.set(0, -0.2, 0.15); handle.rotation.x = -0.3;
            weaponGroup.add(handle);

            // --- THE FLASHLIGHT (WITH RIM EFFECT) ---
            const flashlight = new THREE.SpotLight(0xffffff, 6, 25, Math.PI / 3.5, 0.4, 1.2);
            flashlight.castShadow = true;
            flashlight.shadow.mapSize.width = 2048;
            flashlight.shadow.bias = -0.0005;

            // The "Rim" Texture
            const lightTexture = new THREE.CanvasTexture((() => {
                const c = document.createElement('canvas'); c.width = 256; c.height = 256;
                const ctx = c.getContext('2d');
                const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
                g.addColorStop(0, 'rgba(255, 255, 255, 1)');
                g.addColorStop(0.2, 'rgba(255, 255, 255, 0.8)');
                g.addColorStop(0.4, 'rgba(200, 200, 255, 0.2)');
                g.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
                return c;
            })());

            flashlight.map = lightTexture;
            flashlight.position.set(0, -0.05, -0.2);

            // CRITICAL: The target must be added to the weaponGroup to move with it
            flashlight.target.position.set(0, -0.05, -30);
            weaponGroup.add(flashlight);
            weaponGroup.add(flashlight.target);

            // --- MUZZLE FLASH ---
            const flashTex = new THREE.CanvasTexture((() => {
                const c = document.createElement('canvas'); c.width = 64; c.height = 64;
                const x = c.getContext('2d');
                const g = x.createRadialGradient(32, 32, 0, 32, 32, 32);
                g.addColorStop(0, 'white'); g.addColorStop(0.2, 'orange'); g.addColorStop(1, 'black');
                x.fillStyle = g; x.fillRect(0, 0, 64, 64); return c;
            })());

            const muzzleFlash = new THREE.Sprite(new THREE.SpriteMaterial({ map: flashTex, blending: THREE.AdditiveBlending, transparent: true }));
            muzzleFlash.scale.set(0.6, 0.6, 1); muzzleFlash.position.set(0, 0.05, -0.5);
            muzzleFlash.visible = false;
            weaponGroup.add(muzzleFlash);

            // Attach weapon to camera
            weaponGroup.position.set(0.35, -0.35, -0.7);
            camera.add(weaponGroup);
            scene.add(camera);

            // Ambient and Moon (Declare these once)
            const ambient = new THREE.AmbientLight(0x0a0a15, 0.1);
            scene.add(ambient);
            const moonLight = new THREE.DirectionalLight(0x223344, 0.4);
            moonLight.position.set(50, 100, 50);
            scene.add(moonLight);

        // --- 4. REALISTIC TREES ---
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.5, 9, 8), new THREE.MeshStandardMaterial({ color: 0x1a0f08 }));
            trunk.position.y = 4.5; trunk.castShadow = true; trunk.receiveShadow = true;
            const canopy = new THREE.Mesh(new THREE.IcosahedronGeometry(2.5, 0), new THREE.MeshStandardMaterial({ color: 0x050804 }));
            canopy.position.y = 8; canopy.castShadow = true;
            treeGroup.add(trunk, canopy);
            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
        }
        for (let i = 0; i < 50; i++) createTree(Math.random() * 120 - 60, Math.random() * 120 - 60);

        // --- 5. REALISTIC ZOMBIE SYSTEM ---
        const zombies = [];
        const zombieTargets = [];
        const raycaster = new THREE.Raycaster();

        function spawnZombie() {
                const group = new THREE.Group();

                // --- HIGH-DETAIL MATERIALS ---
                const skinMat = new THREE.MeshStandardMaterial({ color: 0x2d3025, roughness: 0.8, metalness: 0.1 });
                const shirtMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
                const pantsMat = new THREE.MeshStandardMaterial({ color: 0x1a1510, roughness: 1.0 });
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });

                // --- TORSO (2-SEGMENT SPINE) ---
                // Lower Torso / Waist
                const waist = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.4, 16), shirtMat);
                waist.position.y = 1.1;
                group.add(waist);

                // Upper Torso / Chest (Tapered for shoulders)
                const chest = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.18, 0.45, 16), shirtMat);
                chest.position.set(0, 1.45, -0.05);
                chest.rotation.x = 0.2; // Slumped chest
                group.add(chest);

                // --- PELVIS (Fixes the leg issue) ---
                const pelvis = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 12), pantsMat);
                pelvis.position.y = 0.95;
                pelvis.scale.y = 0.6; // Flattened sphere for anatomical hips
                group.add(pelvis);

                // --- HEAD & ANATOMICAL NECK ---
                const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.07, 0.15, 8), skinMat);
                neck.position.set(0, 1.68, -0.12);
                group.add(neck);

                const head = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 16), skinMat);
                head.position.set(0, 1.85, -0.2);
                head.rotation.x = 0.1;
                group.add(head);

                // Sunken Red Eyes
                const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.02, 8, 8), eyeMat);
                eyeL.position.set(0.07, 1.88, -0.34);
                const eyeR = eyeL.clone();
                eyeR.position.set(-0.07, 1.88, -0.34);
                group.add(eyeL, eyeR);

                // --- ARMS (ALIGNED & STRAIGHT) ---
            function createArm(side) {
                const armGroup = new THREE.Group();

                // 1. The Shoulder Socket
                const shoulderSocket = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06, 12, 12),
                    shirtMat
                );
                armGroup.add(shoulderSocket);

                // 2. Upper Arm
                const upper = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.045, 0.04, 0.4, 12), // Slightly shorter upper
                    skinMat
                );
                upper.position.y = -0.2;

                const sleeve = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.058, 0.058, 0.22, 12),
                    shirtMat
                );
                sleeve.position.y = 0.12;
                upper.add(sleeve);
                armGroup.add(upper);

                // 3. Lower Arm (Forearm) - POSITIONED AT ELBOW
                const lower = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.04, 0.025, 0.4, 12),
                    skinMat
                );
                // This position (y: -0.4) places it exactly at the bottom of the upper arm
                lower.position.set(0, -0.4, 0);
                upper.add(lower); // Parented to upper arm so they move as one unit

                // Anchor the arm to the side of the Chest
                armGroup.position.set(side * 0.24, 1.52, -0.05);

                return armGroup;
            }

            const armL = createArm(1);
            const armR = createArm(-1);
            group.add(armL, armR);

                // --- LEGS (WITH KNEES) ---
                function createLeg(side) {
                    const legGroup = new THREE.Group();

                    // Thigh
                    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.07, 0.5, 12), pantsMat);
                    thigh.position.y = -0.25;
                    legGroup.add(thigh);

                    // Shin
                    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.05, 0.5, 12), pantsMat);
                    shin.position.set(0, -0.7, 0.05);
                    shin.rotation.x = 0.1; // Slight knee bend
                    legGroup.add(shin);

                    legGroup.position.set(side * 0.11, 0.95, 0);
                    return legGroup;
                }

                const legL = createLeg(1);
                const legR = createLeg(-1);
                group.add(legL, legR);

                // --- PLACEMENT ---
                const angle = Math.random() * Math.PI * 2;
                const dist = 35 + Math.random() * 15;
                group.position.set(Math.cos(angle) * dist, 0, Math.sin(angle) * dist);

                scene.add(group);

                zombies.push({
                    mesh: group,
                    health: 3,
                    limbs: { armL, armR, legL, legR },
                    offset: Math.random() * 100
                });
                zombieTargets.push(chest, waist, head);
            }

        for (let i = 0; i < 8; i++) spawnZombie();

        function shoot() {
                playGunshot();
                muzzleFlash.visible = true;

                // 1. LIGHT PULSE
                const shotLight = new THREE.PointLight(0xffaa44, 40, 15);
                shotLight.position.copy(camera.position);
                scene.add(shotLight);

                // 2. RECOIL EFFECT
                slide.position.z += 0.15;
                camera.rotation.x += 0.05;

                // 3. HIT DETECTION (The "Killing" Logic)
                raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                const hits = raycaster.intersectObjects(zombieTargets);

                if (hits.length > 0) {
                    const hitObject = hits[0].object;
                    // Find the zombie data by checking the parent groups
                    const zData = zombies.find(z =>
                        z.mesh === hitObject.parent ||
                        z.mesh === hitObject.parent.parent ||
                        z.mesh === hitObject.parent.parent.parent
                    );

                    if (zData) {
                        zData.health -= 1;
                        if (zData.health <= 0) {
                            scene.remove(zData.mesh);
                            // Clean up hitboxes so we don't shoot "ghosts"
                            zData.mesh.traverse(c => {
                                const i = zombieTargets.indexOf(c);
                                if (i > -1) zombieTargets.splice(i, 1);
                            });
                            zombies.splice(zombies.indexOf(zData), 1);
                            setTimeout(spawnZombie, 1000); // Respawn new zombie
                        }
                    }
                }

                // 4. CLEANUP (Muzzle flash and light decay)
                setTimeout(() => {
                    muzzleFlash.visible = false;
                    scene.remove(shotLight);
                    slide.position.z -= 0.15;
                }, 50);
            }

        const controls = new PointerLockControls(camera, document.body);
        let moveF = false, moveB = false, moveL = false, moveR = false;
        const velocity = new THREE.Vector3();

        function triggerEndState(status, sub, color) {
            gameActive = false;
            gameOver = true;
            timerElement.style.display = 'none';
            statusText.innerText = status;
            statusText.style.color = color;
            subText.innerText = sub;
            overlay.style.display = 'flex';
            controls.unlock();
        }

        document.addEventListener('click', () => {
            initAudio();
            if (!controls.isLocked) {
                if (gameOver) {
                    // RESET EVERYTHING
                    timeLeft = 120;
                    camera.position.set(0, 1.6, 0);
                    velocity.set(0, 0, 0);
                    zombies.forEach(z => {
                        const angle = Math.random() * Math.PI * 2;
                        z.mesh.position.set(Math.cos(angle) * 35, 0, Math.sin(angle) * 35);
                        z.health = 3;
                    });
                    gameOver = false;
                }
                controls.lock();
            } else if (gameActive) {
                shoot();
            }
        });

        controls.addEventListener('lock', () => {
            overlay.style.display = 'none';
            timerElement.style.display = 'block';
            gameActive = true;
        });

        controls.addEventListener('unlock', () => {
            if (!gameOver) {
                gameActive = false;
                statusText.innerText = "PAUSED";
                statusText.style.color = "#0f0";
                subText.innerText = "CLICK TO RESUME SQUAD OPERATION";
                overlay.style.display = 'flex';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'KeyW') moveF = true; if (e.code === 'KeyS') moveB = true;
            if (e.code === 'KeyA') moveL = true; if (e.code === 'KeyD') moveR = true;
            if (e.code === 'KeyF') flashlight.visible = !flashlight.visible;
        });
        document.addEventListener('keyup', (e) => {
            if (e.code === 'KeyW') moveF = false; if (e.code === 'KeyS') moveB = false;
            if (e.code === 'KeyA') moveL = false; if (e.code === 'KeyD') moveR = false;
        });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (controls.isLocked && gameActive) {
                // TIMER LOGIC
                timeLeft -= delta;
                const mins = Math.floor(timeLeft / 60);
                const secs = Math.floor(timeLeft % 60);
                timerElement.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                if (timeLeft <= 0) {
                    triggerEndState("SQUAD EXTRACTED", "SUCCESSFUL MISSION - CLICK TO REDEPLOY", "#0f0");
                    return;
                }

                // MOVEMENT LOGIC
                velocity.x -= velocity.x * 10 * delta;
                velocity.z -= velocity.z * 10 * delta;
                const dir = new THREE.Vector3(Number(moveR) - Number(moveL), 0, Number(moveF) - Number(moveB)).normalize();
                if (moveF || moveB) velocity.z -= dir.z * 160 * delta;
                if (moveL || moveR) velocity.x -= dir.x * 160 * delta;
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // ZOMBIE AI & ANIMATION
                zombies.forEach(z => {
                    const time = performance.now() * 0.002 + z.offset;
                    const moveDir = new THREE.Vector3().subVectors(camera.position, z.mesh.position).normalize();

                    z.mesh.position.x += moveDir.x * 2.0 * delta;
                    z.mesh.position.z += moveDir.z * 2.0 * delta;
                    z.mesh.lookAt(camera.position.x, 0, camera.position.z);

                    // COLLISION (DIE ON TOUCH)
                    if (z.mesh.position.distanceTo(camera.position) < 1.5) {
                        triggerEndState("SQUAD WIPED", "YOU WERE OVERRUN - CLICK TO RESTART", "red");
                    }

                    z.mesh.rotation.z = Math.sin(time) * 0.05;
                    z.limbs.armL.rotation.x = -Math.PI / 1.5 + Math.sin(time * 2) * 0.1;
                    z.limbs.armR.rotation.x = -Math.PI / 1.5 + Math.cos(time * 2) * 0.1;
                    z.limbs.legL.rotation.x = Math.sin(time * 5) * 0.2;
                    z.limbs.legR.rotation.x = Math.cos(time * 5) * 0.2;
                });

                camera.rotation.z = 0;
                camera.position.y = 1.6 + Math.sin(performance.now() * 0.008) * 0.02;
            }
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
